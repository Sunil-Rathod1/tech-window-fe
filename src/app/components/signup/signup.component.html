<div class="signup-container">
  <!-- Background with Abstract Shapes -->
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="shape shape-5"></div>
    <div class="shape shape-6"></div>
  </div>

  <!-- Main Signup Form -->
  <div class="signup-form-container">
    <div class="signup-form-card">
      <div class="form-header">
        <h1>TECH WINDOWS</h1>
        <br>
        <h2>Student Sign Up</h2>
        <p>Join thousands of students worldwide</p>
      </div>
      
      <form class="signup-form" (ngSubmit)="onSignup()">
        <div class="form-group">
          <input 
            type="text" 
            placeholder="First Name"
            [(ngModel)]="signupData.firstName"
            name="firstName"
            required
            class="form-input"
          >
        </div>
        
        <div class="form-group">
          <input 
            type="text" 
            placeholder="Last Name"
            [(ngModel)]="signupData.lastName"
            name="lastName"
            required
            class="form-input"
          >
        </div>
        
        <div class="form-group">
          <input 
            type="email" 
            placeholder="Email Address"
            [(ngModel)]="signupData.email"
            name="email"
            required
            class="form-input"
          >
        </div>
        
        <div class="form-group">
          <input 
            type="tel" 
            placeholder="Phone Number"
            [(ngModel)]="signupData.phone"
            name="phone"
            required
            class="form-input"
          >
        </div>
        
        <div class="form-group">
          <input 
            type="date" 
            placeholder="Date of Birth"
            [(ngModel)]="signupData.dateOfBirth"
            name="dateOfBirth"
            class="form-input"
          >
        </div>
        
        <div class="form-group">
          <select 
            [(ngModel)]="signupData.gender"
            name="gender"
            class="form-input"
          >
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <input 
            type="text" 
            placeholder="Nationality"
            [(ngModel)]="signupData.nationality"
            name="nationality"
            class="form-input"
          >
        </div>
        
        <div class="form-group">
          <textarea 
            placeholder="Address"
            [(ngModel)]="signupData.address"
            name="address"
            class="form-input"
            rows="2"
          ></textarea>
        </div>
        
        <div class="form-group">
          <textarea 
            placeholder="Education Background"
            [(ngModel)]="signupData.education"
            name="education"
            class="form-input"
            rows="2"
          ></textarea>
        </div>
        
        <div class="form-group">
          <textarea 
            placeholder="Work Experience"
            [(ngModel)]="signupData.workExperience"
            name="workExperience"
            class="form-input"
            rows="2"
          ></textarea>
        </div>
        
        <div class="form-group">
          <textarea 
            placeholder="Career Goals"
            [(ngModel)]="signupData.careerGoals"
            name="careerGoals"
            class="form-input"
            rows="2"
          ></textarea>
        </div>
        
        <div class="form-group">
          <div class="password-input-wrapper">
            <input 
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Create Password"
              [(ngModel)]="signupData.password"
              name="password"
              required
              class="form-input"
            >
            <button type="button" class="password-toggle" (click)="togglePassword()">
              <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
            </button>
          </div>
        </div>
        
        <div class="form-group">
          <div class="password-input-wrapper">
            <input 
              [type]="showConfirmPassword ? 'text' : 'password'"
              placeholder="Confirm Password"
              [(ngModel)]="signupData.confirmPassword"
              name="confirmPassword"
              required
              class="form-input"
            >
            <button type="button" class="password-toggle" (click)="toggleConfirmPassword()">
              <i class="fas" [class.fa-eye]="!showConfirmPassword" [class.fa-eye-slash]="showConfirmPassword"></i>
            </button>
          </div>
        </div>
        
        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" [(ngModel)]="signupData.agreeToTerms" name="agreeToTerms" required>
            <span class="checkmark"></span>
            <span class="checkbox-text">I agree to the <a href="#" class="terms-link">Terms & Conditions</a></span>
          </label>
        </div>
        
        <!-- Error Message -->
        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>
        
        <!-- Success Message -->
        <div *ngIf="successMessage" class="success-message">
          {{ successMessage }}
        </div>
        
        <button type="submit" class="signup-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Create Student Account</span>
          <div *ngIf="isLoading" class="loading-spinner"></div>
        </button>
      </form>
      
      <div class="divider">
        <span>Or sign up using</span>
      </div>
      
      <div class="social-signup">
        <button class="social-btn google">
          <span class="google-icon">G</span>
        </button>
        <button class="social-btn apple">
          <span class="apple-icon">🍎</span>
        </button>
        <button class="social-btn facebook">
          <span class="facebook-icon">f</span>
        </button>
      </div>
      
      <div class="login-link">
        <p>Already have an account? <a href="#" (click)="goToLogin()">Sign In</a></p>
      </div>
    </div>
  </div>
</div>
